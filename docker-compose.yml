version: '3.8'

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - '3001:3001'
    environment:
      - PORT=3001
      - CORS_ORIGIN=http://localhost:5173
    volumes:
      - server-data:/app/data

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - '5173:5173'
    depends_on:
      - server

volumes:
  server-data:
